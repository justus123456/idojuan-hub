<!-- Admin Wrapper -->
<div class="app-wrap">
  <div class="admin-container">

    <!-- Header -->
    <div class="admin-header">
      <h2><i class="fas fa-building"></i> Property Management System</h2>
      <div class="admin-actions">
        <button id="btn-export" class="btn btn-outline-primary">
          <i class="fas fa-download"></i> Export Data
        </button>
        <button id="btn-import" class="btn btn-outline-success">
          <i class="fas fa-upload"></i> Import Data
        </button>
        <input type="file" id="file-import" accept=".json" style="display: none;">
      </div>
    </div>

    <!-- Page Sections -->
    <div class="page-sections">

      <!-- PROPERTIES -->
      <section id="section-properties" class="page-section">
        <h3>Add New Property</h3>
        <form id="property-form" class="modern-form">
          <div class="form-grid">
            <div class="form-group">
              <label>Property Title</label>
              <input id="title" type="text" class="form-control" placeholder="Enter property title" required>
            </div>
            <div class="form-group">
              <label>Location</label>
              <input id="location" type="text" class="form-control" placeholder="Enter city or neighborhood" required>
            </div>
            <div class="form-group">
              <label>Price (₦)</label>
              <input id="price" type="number" class="form-control" placeholder="Enter price" required>
            </div>
            <div class="form-group">
              <label>Status</label>
              <select id="status" class="form-control" required>
                <option value="">Select Status</option>
                <option value="for_sale">For Sale</option>
                <option value="for_rent">For Rent</option>
                <option value="sold">Sold</option>
                <option value="reserved">Reserved</option>
                <option value="under_review">Under Review</option>
              </select>
            </div>
            <div class="form-group">
              <label>Property Type</label>
              <select id="property_type" class="form-control" required>
                <option value="">Select Type</option>
                <option value="house">House</option>
                <option value="apartment">Apartment</option>
                <option value="condo">Condo</option>
                <option value="townhouse">Townhouse</option>
                <option value="commercial">Commercial</option>
              </select>
            </div>
            <div class="form-group">
              <label>Bedrooms</label>
              <input id="bedrooms" type="number" class="form-control">
            </div>
            <div class="form-group">
              <label>Bathrooms</label>
              <input id="bathrooms" type="number" class="form-control">
            </div>
            <div class="form-group">
              <label>Size (sq ft)</label>
              <input id="size" type="text" class="form-control">
            </div>
            <div class="form-group">
              <label>Badge (optional)</label>
              <input id="badge" class="form-control" placeholder="e.g. Featured, New, Hot">
            </div>
          </div>

          <div class="form-group">
            <label>Description</label>
            <textarea id="description" class="form-control" rows="3"></textarea>
          </div>

          <div class="form-group">
            <label>Property Images</label>
            <input id="imageFiles" type="file" accept="image/*" class="form-control" multiple>
          </div>

          <div class="form-group">
            <label>Interior Amenities</label>
            <input id="interior_amenities" class="form-control">
          </div>
          <div class="form-group">
            <label>Exterior Amenities</label>
            <input id="exterior_amenities" class="form-control">
          </div>

          <div class="d-flex gap-2 mt-3">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-save"></i> Save Property
            </button>
            <button type="button" id="btn-reset" class="btn btn-ghost">Reset</button>
            <button type="button" id="btn-preview" class="btn btn-outline-secondary ms-auto">Preview Client Page</button>
          </div>
        </form>

        <h3 class="mt-4">Manage Properties</h3>
        <div id="properties-list"></div>
      </section>

      <!-- ORDERS -->
      <section id="section-orders" class="page-section" style="display:none;">
        <h3>Orders Management</h3>
        <div id="orders-list">
          <h4>Materials</h4>
<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Description</th>
      <th>Price</th>
      <th>Unit</th>
    </tr>
  </thead>
  <tbody id="materials-table-body"></tbody>
</table>
        </div>
      </section>

      <!-- MATERIALS -->
<section id="section-materials" class="page-section" style="display: none;">
  <h3>Add New Material</h3>
  <form id="material-form" class="modern-form">
    <div class="form-grid">
      <div class="form-group">
        <label for="material-name">Material Name</label>
        <input id="material-name" type="text" class="form-control" placeholder="Enter material name" required>
      </div>
      <div class="form-group">
        <label for="material-price">Price (₦)</label>
        <input id="material-price" type="number" class="form-control" placeholder="Enter material price" required>
      </div>
      <div class="form-group">
        <label for="material-quality">Quality</label>
        <input id="material-quality" type="text" class="form-control" placeholder="Enter quality (e.g. High, Medium, Low)">
      </div>
    </div>
    <button type="submit" class="btn btn-primary">
      <i class="fas fa-save"></i> Save Material
    </button>
  </form>

  <h4 style="margin-top: 2rem;">Materials List</h4>
  <div id="materials-list" class="list-container">
    <h4>Materials</h4>
<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Description</th>
      <th>Price</th>
      <th>Unit</th>
    </tr>
  </thead>
  <tbody id="materials-table-body"></tbody>
</table>
  </div>
</section>


    </div>
  </div>
</div>
