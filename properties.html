  <body class="properties-page">

    <div id="header"></div>

    <script>
  fetch("forms/header.html")
    .then(response => response.text())
    .then(data => {
      document.getElementById("header").innerHTML = data;
    });
</script>

    <main class="main">

      <!-- Page Title -->
      <div class="page-title">
        <div class="heading">
          <div class="container">
            <div class="row d-flex justify-content-center text-center">
              <div class="col-lg-8">
                <h1 class="heading-title">Properties</h1>
                <p class="mb-0">
                  At IdoJuan Properties, we believe every property tells a story
                  — whether it’s a family finding their first home, an investor
                  securing their future, or a business expanding into new
                  spaces.
                </p>

              </div>
            </div>
          </div>
        </div>
        <nav class="breadcrumbs">
          <div class="container">
            <ol>
              <li><a href="index.html">Home</a></li>
              <li class="current">Properties</li>
            </ol>
          </div>
        </nav>
      </div><!-- End Page Title -->

      <!-- Properties Section -->
      <section id="properties grid" class="properties section">

        <div class="container" data-aos="fade-up" data-aos-delay="100">

          <div class="row">

            <div class="col-lg-8">

              <div class="properties-header mb-4">
                <div
                  class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                  <div class="view-toggle d-flex gap-2">
                    <button
                      class="btn btn-outline-secondary btn-sm view-btn active"
                      data-view="grid">
                      <i class="bi bi-grid-3x3-gap"></i> Grid
                    </button>
                    <button class="btn btn-outline-secondary btn-sm view-btn"
                      data-view="list">
                      <i class="bi bi-list"></i> List
                    </button>
                  </div>
                  <div class="sort-dropdown">
                    <select id="sortSelect" class="form-select form-select-sm">
                      <option value="newest">Sort by: Newest</option>
                      <option value="price-asc">Price: Low to High</option>
                      <option value="price-desc">Price: High to Low</option>
                      <option value="most-viewed">Most Viewed</option>
                    </select>
                  </div>
                </div>
              </div>

              <div class="space">
                <div class="properties-list view-grid active" data-aos="fade-up"
                  data-aos-delay="200">
                  <div class="row g-4" id="all-properties-grid">

                  </div>

                  <nav class="mt-5" data-aos="fade-up" data-aos-delay="300">
                    <ul class="pagination justify-content-center">
                      <li class="page-item disabled">
                        <a class="page-link" href="#" tabindex="-1">Previous</a>
                      </li>
                      <li class="page-item active"><a class="page-link"
                          href="#">1</a></li>
                      <li class="page-item"><a class="page-link"
                          href="#">2</a></li>
                      <li class="page-item"><a class="page-link"
                          href="#">3</a></li>
                      <li class="page-item">
                        <a class="page-link" href="#">Next</a>
                      </li>
                    </ul>
                  </nav>

                </div>

                <div class="col-lg-4" data-aos="fade-up" data-aos-delay="200">

                  <div class="properties-sidebar">

                    <div class="filter-widget">
                      <h5 class="filter-title">Filter Properties</h5>

                      <div class="filter-section">
                        <label class="form-label">Property Type</label>
                        <select class="form-select" id="propertyType">
                          <option value="all">All Types</option>
                          <option value="house">House</option>
                          <option value="apartment">Apartment</option>
                          <option value="condo">Condo</option>
                          <option value="land">Land</option>
                        </select>
                      </div>

                      <div class="filter-section">
                        <label class="form-label">Price Range</label>
                        <div class="row g-2">
                          <div class="col-6">
                            <input type="number" class="form-control"
                              id="minPrice"
                              placeholder="Min Price">
                          </div>
                          <div class="col-6">
                            <input type="number" class="form-control"
                              id="maxPrice"
                              placeholder="Max Price">
                          </div>
                        </div>
                      </div>

                      <div class="filter-section">
                        <label class="form-label">Bedrooms</label>
                        <div class="bedroom-filter">
                          <button
                            class="btn btn-outline-secondary btn-sm filter-btn active">Any</button>
                          <button
                            class="btn btn-outline-secondary btn-sm filter-btn">1+</button>
                          <button
                            class="btn btn-outline-secondary btn-sm filter-btn">2+</button>
                          <button
                            class="btn btn-outline-secondary btn-sm filter-btn">3+</button>
                          <button
                            class="btn btn-outline-secondary btn-sm filter-btn">4+</button>
                        </div>
                      </div>

                      <div class="filter-section">
                        <label class="form-label">Bathrooms</label>
                        <div class="bathroom-filter">
                          <button
                            class="btn btn-outline-secondary btn-sm filter-btn active">Any</button>
                          <button
                            class="btn btn-outline-secondary btn-sm filter-btn">1+</button>
                          <button
                            class="btn btn-outline-secondary btn-sm filter-btn">2+</button>
                          <button
                            class="btn btn-outline-secondary btn-sm filter-btn">3+</button>
                        </div>
                      </div>

                      <div class="filter-section">
                        <label class="form-label">Location</label>
                        <input type="text" class="form-control" id="location"
                          placeholder="Enter city or neighborhood">
                      </div>

                      <button id="applyFiltersBtn" type="button"
                        class="btn btn-primary w-100">Apply
                        Filters</button>

                    </div>

                  </div>

                </div>
              </div>

            </div>

          </div>

        </section><!-- /Properties Section -->

      </main>

</script>
