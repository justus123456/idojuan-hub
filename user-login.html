  <style>
    .mode-switch {
      margin-bottom: 26px;
    }
    .auth-toggle {
      appearance: none;
      border: 1px solid #d0d7e2 !important;
      background: #ffffff !important;
      color: #1f2937 !important;
      border-radius: 999px;
      padding: 8px 18px;
      font-weight: 600;
      font-size: 0.95rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }
    .auth-toggle.is-active {
      background: #1d4ed8 !important;
      color: #ffffff !important;
      border-color: #1d4ed8 !important;
      box-shadow: 0 8px 16px rgba(29, 78, 216, 0.18);
    }
    .submit-btn {
      width: 100%;
      height: 48px;
      border: none;
      border-radius: 10px;
      background: #1d4ed8;
      color: #ffffff;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
  </style>
</head>
<body>
  <div id="header"></div>
  <script>
    fetch("forms/header.html")
      .then(response => response.text())
      .then(data => {
        document.getElementById("header").innerHTML = data;
      });
  </script>

  <div class="auth-container">
    <div class="auth-sidebar">
      <div>
        <h2>Welcome Back!</h2>
        <p>Sign in to view your order history and track deliveries.</p>
      </div>
    </div>

    <div class="auth-main">
      <form class="auth-form" id="userAuthForm">
        <div class="form-header">
          <h1 id="formTitle">User Sign In</h1>
          <p id="formSubtitle">Enter your email and password</p>
        </div>

        <div class="mode-switch">
          <button type="button" class="auth-toggle is-active" id="modeSignIn">Sign In</button>
          <button type="button" class="auth-toggle" id="modeSignUp">Create Account</button>
        </div>

        <div class="form-group">
          <i class="fas fa-envelope input-icon"></i>
          <input type="email" class="form-control" id="email" placeholder="Email address" required>
        </div>

        <div class="form-group">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" class="form-control" id="password" placeholder="Password" required>
          <i class="far fa-eye password-toggle" id="passwordToggle"></i>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
          <span id="submitLabel">Sign In</span>
          <div class="loader"><i class="fas fa-spinner fa-spin"></i></div>
        </button>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>
      </form>
    </div>
  </div>

  <div id="footer"></div>
  <script>
    fetch("forms/footer.html")
      .then(response => response.text())
      .then(data => {
        document.getElementById("footer").innerHTML = data;
      });
  </script>

  <a href="#" id="scroll-top" class="scroll-top d-flex align-items-center justify-content-center"><i class="bi bi-arrow-up-short"></i></a>
  <div id="preloader"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="assets/vendor/php-email-form/validate.js"></script>
  <script src="assets/vendor/aos/aos.js"></script>
  <script src="assets/vendor/purecounter/purecounter_vanilla.js"></script>
  <script src="assets/vendor/glightbox/js/glightbox.min.js"></script>
  <script src="assets/vendor/swiper/swiper-bundle.min.js"></script>
  <script src="assets/vendor/drift-zoom/Drift.min.js"></script>
  <script src="assets/js/user-auth.js"></script>
  <script src="assets/js/main.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const next = params.get("next");
    if (next) {
      localStorage.setItem("auth_redirect", next);
    }
  </script>
</body>
</html>
